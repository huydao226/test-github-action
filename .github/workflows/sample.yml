name: Simple Math CI

on:
  workflow_dispatch:
    inputs: 
        var_A:
            description: 'Giá trị A'
            required: true
            default: "1"
        var_B:
            description: 'Giá trị B'
            required: true
            default: "2"
        var_C:
            description: 'Giá trị C'
            required: true
            type: choice
            options:
              - "1"
              - "2"
              - "3"
              - "4"
              - "5"
            default: "2"
  push:
    branches:
      - main
    
env:
  var_A: "10"  
  var_B: ${{ vars.VarB }}
  var_C: ${{ secrets.SecretC }} 


jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Say hello
        run: |
            result=$(($var_A + $var_B))
            echo "The result of A + B is: $result" 
    